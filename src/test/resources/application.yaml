server:
  port: 0

application:
  jwt:
    secret: bXlTdXBlclNlY3JldEtleUZvcklzc3VlRmxvd0pXVEFwcGxpY2F0aW9uMjAyNg==
    expiration: 3600000

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:postgresql://localhost:5432/issueflow
    username: issueflow
    password: issueflow
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ticket:
  escalation:
    cron: "0 0 0 29 2 ?"
